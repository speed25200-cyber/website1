name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site (exclude backend & meta from published artifact)
        run: |
          mkdir -p _site
          # Copie tout sauf le backend, les workflows et le dossier git
          rsync -a --exclude='_site' --exclude='.git' --exclude='.github' --exclude='server' --exclude='admin.html' ./ _site/
          # Empêche Jekyll de traiter le site (sert les fichiers tels quels)
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
